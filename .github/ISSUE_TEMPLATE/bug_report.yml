name: Bug report
description: Something isn't working as expected
labels: [bug]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: A clear description of the bug, and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open Settings…
        2. Add a member…
        3. Convene…
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: Release tag or build (e.g. v1.0.0).
    validations:
      required: false
  - type: dropdown
    id: install
    attributes:
      label: Install type
      options:
        - Installer
        - Portable
        - Built from source
    validations:
      required: false
