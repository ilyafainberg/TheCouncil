# build.yml — compile The Council on every push / PR so breakage is caught
# before a release tag is ever cut.
name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
          dotnet-quality: 'preview'

      - name: Build (Release)
        run: dotnet build TheCouncil.csproj -c Release
